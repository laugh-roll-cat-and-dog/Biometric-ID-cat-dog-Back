apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatthedog-back
  labels:
    app: whatthedog-back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatthedog-back
  template:
    metadata:
      labels:
        app: whatthedog-back
    spec:
      containers:
        - name: api
          image: 192.168.1.57:5000/whatthedog-back:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: ai-models
              mountPath: /app/app/ai
              readOnly: true
            - name: dog-images
              mountPath: /srv/storage/whatthedog/dog_images
              readOnly: false
      volumes:
        - name: ai-models
          hostPath:
            path: /home/mon/ai
            type: Directory
        - name: dog-images
          hostPath:
            path: /srv/storage/whatthedog/dog_images
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: whatthedog-back-service
spec:
  type: NodePort
  selector:
    app: whatthedog-back
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30007